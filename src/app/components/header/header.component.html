<header class="header" *ngIf="profile$ | async as profile">
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">
        <h1>{{ profile.basicInfo.name }}</h1>
        <span class="nav-title">{{ profile.basicInfo.title }}</span>
      </div>
      
      <ul class="nav-menu">
        <li class="nav-item">
          <a href="#about" class="nav-link" (click)="onNavClick($event, 'about')">About</a>
        </li>
        <li class="nav-item">
          <a href="#skills" class="nav-link" (click)="onNavClick($event, 'skills')">Skills</a>
        </li>
        <li class="nav-item">
          <a href="#experience" class="nav-link" (click)="onNavClick($event, 'experience')">Experience</a>
        </li>
        <li class="nav-item">
          <a href="#projects" class="nav-link" (click)="onNavClick($event, 'projects')">Projects</a>
        </li>
        <li class="nav-item">
          <a href="#education" class="nav-link" (click)="onNavClick($event, 'education')">Education</a>
        </li>
        <li class="nav-item">
          <a href="#contact" class="nav-link" (click)="onNavClick($event, 'contact')">Contact</a>
        </li>
      </ul>

      <div class="nav-social">
        <a *ngFor="let link of profile.socialLinks" 
           [href]="link.url" 
           target="_blank" 
           rel="noopener noreferrer"
           class="social-link"
           [title]="link.platform">
          <span class="social-icon">{{ link.platform.charAt(0) }}</span>
        </a>
      </div>
    </div>
  </nav>
</header>
